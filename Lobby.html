<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkFast – Launch Session</title>
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="launchsession.css">
</head>
<body>

    <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>

    <nav class="navbar">
    <a class="nav-logo" href="#"><div class="nav-logo-icon">⚡</div><span class="nav-logo-name">Think<span>Fast</span></span></a>
    <div class="nav-right">
      <span class="nav-badge">🎓 Teacher</span>
      <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
      <a class="nav-btn" href="questionbank.html">📚 Question Bank</a>
      <a class="nav-btn" href="javascript:void(0)" onclick="handleLogout()">🚪 Log Out</a>
    </div>
    </nav>

    <main class="main">
        <div class="session-panel" id="session-panel"></div>

            <div class="page-header">
                <h1>⚡ Session <span>Live!</span></h1>
                <p id="session-subtitle">Waiting for players to join…</p>
            </div>

            <div class="pin-section">
                <div class="pulse-ring"></div><div class="pulse-ring"></div><div class="pulse-ring"></div>
                <div class="pin-label">Game PIN</div>
                <div class="pin-box" id="pin-display">------<button class="pin-copy" onclick="copyPin()" title="Copy PIN">📋</button></div>
                <!--Not implementing joining through public website yet: <div class="pin-hint">Students go to <strong>thinkfast.game</strong> and enter this PIN</div> -->
            </div>

            <div class="session-stats">
                <div class="s-stat"><div class="s-stat-icon yellow">👥</div><div><div class="s-stat-val" id="stat-players">0</div><div class="s-stat-lbl">Players Joined</div></div></div>
                <div class="s-stat"><div class="s-stat-icon green">❓</div><div><div class="s-stat-val" id="stat-qcount">0</div><div class="s-stat-lbl">Questions</div></div></div>
                <div class="s-stat"><div class="s-stat-icon blue">⏱️</div><div><div class="s-stat-val" id="stat-time">20s</div><div class="s-stat-lbl">Per Question</div></div></div>
                <div class="s-stat"><div class="s-stat-icon red">🔴</div><div><div class="s-stat-val" id="stat-status">Waiting</div><div class="s-stat-lbl">Status</div></div></div>
            </div>

            <div class="q-progress" id="q-progress" style="display:none">
                <div class="q-progress-header">
                    <span class="q-progress-title">Current Question</span>
                    <span class="q-progress-num" id="q-progress-num">1 / 5</span>
                </div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
            <div class="q-current-text" id="q-current-text"></div>
            </div>

            <div class="players-card">
                <div class="players-header">
                    <span class="players-title">👾 Players in Lobby</span>
                    <span class="live-dot">Live</span>
                </div>
            <div class="player-grid" id="player-grid">
                <div class="waiting-msg">⏳ Waiting for players to join<span class="waiting-dots"><span>.</span><span>.</span><span>.</span></span></div>
            </div>
            </div>

            <div class="controls-row">
                <button class="ctrl-btn start"  id="btn-start"  onclick="startGame()"  disabled>▶️ Start Game</button>
                <button class="ctrl-btn pause"  id="btn-pause"  onclick="pauseGame()"  disabled>⏸️ Pause</button>
                <button class="ctrl-btn end"    id="btn-end"    onclick="endSession()">🛑 End Session</button>
            </div>

        </div>
    </main>

<script>
    // Enforces only logged in users can access this page
    const teacherId = localStorage.getItem('teacher_id');
    if (!teacherId) {
    // If no teacher ID is found, kick them back to login
    window.location.href = 'index.html';
    }

    const $ = id => document.getElementById(id);
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('id');
    
    // Retrieve the teacher's ID saved during login
    const currentTeacherId = localStorage.getItem('teacher_id');
    
    let players = [];

    // Initial Load: Get session info and start listening
    async function initLobby() {
        if (!sessionId) {
            window.location.href = 'LaunchSession.html';
            return;
        }

        // Fetch session details from Supabase
        const { data: session } = await supabase
            .from('game_sessions')
            .select('*, quizzes(title, question_count)')
            .eq('id', sessionId)
            .single();

        if (session) {
            $('pin-display').innerHTML = `${session.join_code} <button class="pin-copy" onclick="copyPin('${session.join_code}')">📋</button>`;
            $('stat-qcount').textContent = session.quizzes.question_count;
            $('stat-time').textContent = session.settings.time_limit + 's';
        }

        subscribeToHardware();
    }

    // Realtime Listener: Detects when an ESP32 connects to the database
    function subscribeToHardware() {
        supabase
            .channel('lobby-updates')
            .on('postgres_changes', { 
                event: 'INSERT', 
                schema: 'public', 
                table: 'session_participants',
                filter: `session_id=eq.${sessionId}` 
            }, payload => {
                // When a controller joins, prompt the teacher to assign a student
                assignStudent(payload.new.id, payload.new.controller_id);
            })
            .subscribe();
    }

    // Mapping Logic: Link the physical controller to a specific student
    async function assignStudent(participantRowId, controllerId) {
    const studentIdInput = prompt(`New Controller: ${controllerId}\nEnter Student ID:`);
    const currentTeacherId = localStorage.getItem('teacher_id');

        if (studentIdInput && currentTeacherId) {
            // Filter by 'teacher_id' to ensure the teacher can't link a student that doesn't belong to their profile.
            const { data: student, error } = await supabase
                .from('students')
                .select('id, student_name, student_code') // Display student_code too to help teachers identify the correct student
                .eq('student_code', studentIdInput) // filter by student_code instead of uuid for better, easier UX
                .eq('teacher_id', currentTeacherId) 
                .single();

            if (error || !student) {
                alert("Student not found in the class list.");
                return;
            }

            // Update participant record with the student's ID
            await supabase
                .from('session_participants')
                .update({ student_id: student.id })
                .eq('id', participantRowId);
                
            // Pass student's data to UI Render function so it shows the student's data
            renderPlayerChip({ ...student, controller_id: controllerId });
        }
    }

    function renderPlayerChip(participant) {
        if (players.length === 0) $('player-grid').innerHTML = '';
        players.push(participant);
        $('stat-players').textContent = players.length;

        const chip = document.createElement('div');
        chip.className = 'player-chip';
        chip.innerHTML = `
            <div class="player-avatar" style="background: var(--blue)">👾</div>
            <div>
                <strong>${participant.student_name}</strong>
                <!-- Added the student code right here so the teacher can verify it -->
                <div style="font-size: 10px; opacity: 0.7;">
                    Code: ${participant.student_code} | Ctrl: ${participant.controller_id}
                </div>
            </div>
        `;
        $('player-grid').appendChild(chip);
        $('btn-start').disabled = false;
    }

    async function endSession() {
        if (confirm("Are you sure you want to end this session? All progress will be saved.")) {
            // Update the session status in Supabase
            await supabase
                .from('game_sessions')
                .update({ status: 'finished' })
                .eq('id', sessionId);

            // Redirect back to the launch page
            window.location.href = 'LaunchSession.html';
        }
    }
    
    function copyPin(pin) {
        navigator.clipboard.writeText(pin);
        alert("PIN Copied!");
    }

    initLobby();

</script>

</body>
</html>
